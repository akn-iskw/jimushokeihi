<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事務所分：立替金清算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;--border:#e0e6ed;--border2:#c8d3de;
  --text:#1a2332;--text2:#5a6a7a;--text3:#9aaabb;
  --accent:#1a5fa8;--accent-light:#e6f1fb;--accent-mid:#378add;
  --danger:#c0392b;--danger-light:#fdf0ee;
  --amber:#b5620a;--amber-light:#fef3e2;
  --radius:10px;--radius-sm:6px;
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f1620;--surface:#1a2232;--surface2:#1f2a3d;--border:#2a3a4d;--border2:#3a4d63;
  --text:#e8f0f8;--text2:#8aabcc;--text3:#4a6a8a;
  --accent:#5aabee;--accent-light:#0a2040;--accent-mid:#378add;
  --danger:#e05c4b;--danger-light:#2a1815;--amber:#d4832a;--amber-light:#2a1e0a;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:0 0 80px}

header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0}
header h1{font-size:14px;font-weight:600;flex:1}
.hdr-btns{display:flex;gap:8px;align-items:center}
.hdr-btn{font-size:12px;font-weight:500;padding:4px 11px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:none;color:var(--text2);white-space:nowrap}
.year-btn{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}
.api-btn{color:var(--amber);border-color:var(--amber)}
.api-btn.set{color:var(--accent);border-color:var(--accent)}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:11px 15px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

.tab-panel{display:none;padding:20px}.tab-panel.on{display:block}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-hdr-icon{width:26px;height:26px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:13px}
.icon-blue{background:var(--accent-light)}
.icon-amber{background:var(--amber-light)}
.card-hdr-label{font-size:13px;font-weight:600}
.card-body{padding:16px}

/* form */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fgrid.full{grid-template-columns:1fr}
.fgrid.tri{grid-template-columns:1fr 1fr 1fr}
.flabel{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;margin-bottom:4px}
input,select,textarea{width:100%;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px}
input:focus,select:focus{outline:none;border-color:var(--accent-mid)}
.reg-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:2px}
.reg-btn:hover{opacity:.85}

/* upload */
.dropzone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;position:relative;background:var(--surface2);transition:background .15s}
.dropzone:hover{background:var(--accent-light);border-color:var(--accent-mid)}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:26px;margin-bottom:8px}
.drop-main{font-size:14px;font-weight:600;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--text3)}

/* table */
.tbl-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tbl-controls select,.tbl-controls input{font-size:13px}
.tbl-controls select{max-width:110px}
.export-btn{padding:7px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
.export-btn:hover{background:var(--surface2)}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--surface2);padding:9px 11px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}

/* badges */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.b-travel{background:#e8f3fe;color:#1a5fa8}.b-car{background:#fef3e2;color:#8a4500}
.b-welfare{background:#fce8f3;color:#8a1a5a}.b-supply{background:#e8fef0;color:#1a6b3a}
.b-entertain{background:#f0e8fe;color:#5a1a8a}.b-comm{background:#fef0e8;color:#8a3a1a}
.b-tax{background:#fee8e8;color:#8a1a1a}.b-fee{background:#f0f0f0;color:#4a4a4a}
.b-repair{background:#e8fefe;color:#006a6a}.b-meet{background:#f8f8e8;color:#6a6a00}
.b-util{background:#e8f8fe;color:#1a6a8a}.b-rent{background:#fef8e8;color:#8a6a1a}
.b-misc{background:#f5f0ea;color:#6a5030}.b-other{background:var(--surface2);color:var(--text2)}

/* office badges */
.ob{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--accent-light);color:var(--accent)}

/* metrics */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:5px}
.metric-val{font-size:18px;font-weight:600;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}

.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:3px}

.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px}
.del-btn:hover{background:var(--danger-light);color:var(--danger)}

/* modals */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:min(400px,92vw);max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;border:none;font-weight:600;flex:1}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid var(--danger)}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0 14px}
.ybtn{padding:8px 4px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);text-align:center}
.ybtn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:9px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading-ov{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:200}
.loading-ov.show{display:flex}
.loading-box{background:var(--surface);border-radius:var(--radius);padding:24px 32px;text-align:center}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text2)}

.scan-result{margin-top:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);font-size:12px;color:var(--text2);display:none}

@media(max-width:600px){
  .tabs{padding:0 12px}.tab{padding:11px 10px;font-size:12px}
  .tab-panel{padding:14px}
  header{padding:11px 14px}header h1{font-size:13px}
  th:nth-child(4),td:nth-child(4){display:none}
  .fgrid.tri{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">立</div>
  <h1>事務所分：立替金清算</h1>
  <div class="hdr-btns">
    <button class="hdr-btn api-btn" id="apiBtn" onclick="openApiModal()">🔑 APIキー</button>
    <button class="hdr-btn year-btn" id="yearBtn" onclick="openYearModal()">2026年 ▾</button>
  </div>
</header>

<!-- YEAR MODAL -->
<div class="modal-bg" id="yearModal">
  <div class="modal">
    <h3>年度を選択</h3>
    <div class="year-grid" id="yearGrid"></div>
    <div style="display:flex;gap:8px;align-items:center;border-top:1px solid var(--border);padding-top:12px">
      <input type="number" id="customYear" placeholder="直接入力" min="2000" max="2099" style="flex:1">
      <button class="btn-primary" style="flex:none;padding:7px 12px" onclick="applyCustomYear()">確定</button>
      <button class="btn-secondary" onclick="closeYearModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- API MODAL -->
<div class="modal-bg" id="apiModal">
  <div class="modal">
    <h3>Anthropic APIキー設定</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6">設定すると画像の領収書をAIで自動読み取りできます。<br>未設定でも手動入力は使えます。<br>キーは <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent)">console.anthropic.com</a> で取得できます。</p>
    <input type="password" id="apiInput" placeholder="sk-ant-..." autocomplete="off" style="font-family:monospace">
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveApiKey()">保存する</button>
      <button class="btn-danger" onclick="clearApiKey()">削除</button>
      <button class="btn-secondary" onclick="closeApiModal()">閉じる</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('input')">入力</button>
  <button class="tab" onclick="switchTab('list')">一覧</button>
  <button class="tab" onclick="switchTab('summary')">集計</button>
</div>

<!-- INPUT TAB -->
<div id="tab-input" class="tab-panel on">
  <div class="card">
    <div class="card-hdr"><div class="card-hdr-icon icon-blue">✏️</div><span class="card-hdr-label">手動入力</span></div>
    <div class="card-body">
      <div class="fgrid tri">
        <div><div class="flabel">日付</div><input type="date" id="i_date"></div>
        <div><div class="flabel">月</div>
          <select id="i_month">
            <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
            <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
            <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
          </select>
        </div>
        <div><div class="flabel">事業所</div>
          <select id="i_office" onchange="toggleCustomOffice(this)">
            <option>エスカ</option><option>アール</option><option>ウィズ</option><option>ルミナス</option>
            <option>茶屋</option><option>アサノ</option><option>知立</option><option>小牧</option>
            <option>八事</option><option>岩田</option><option>大森</option><option>京都</option><option>銀座</option>
            <option value="__custom_office__">新規追加...</option>
          </select>
          <input type="text" id="i_office_custom" placeholder="事業所名を入力" style="display:none;margin-top:6px">
        </div>
      </div>
      <div class="fgrid">
        <div><div class="flabel">借方科目</div>
          <select id="i_cat" onchange="toggleCustomCat(this)">
            <option>旅費交通費</option><option>車両費</option><option>厚生費</option><option>消耗品費</option>
            <option>接待交際費</option><option>通信費</option><option>租税公課</option><option>支払手数料</option>
            <option>修繕費</option><option>会議費</option><option>水道光熱費</option><option>地代家賃</option><option>雑費</option>
            <option value="__custom__">その他（直接入力）</option>
          </select>
          <input type="text" id="i_cat_custom" placeholder="科目名を入力" style="display:none;margin-top:6px">
        </div>
        <div><div class="flabel">金額（円）</div><input type="number" id="i_amt" placeholder="0"></div>
      </div>
      <div class="fgrid full"><div><div class="flabel">取引先</div><input type="text" id="i_vendor" placeholder="例: 名古屋市交通局"></div></div>
      <div class="fgrid full"><div><div class="flabel">内容</div><input type="text" id="i_detail" placeholder="例: 駐車場代"></div></div>
      <button class="reg-btn" onclick="addEntry()">登録する</button>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="card-hdr-icon icon-blue">📷</div><span class="card-hdr-label">領収書をアップロード（画像・PDF）</span></div>
    <div class="card-body">
      <div class="dropzone">
        <input type="file" id="imgInput" accept="image/*,application/pdf" multiple>
        <div class="drop-icon">📷</div>
        <p class="drop-main" id="dropMain">写真・PDF を選択またはドロップ</p>
        <p class="drop-sub" id="dropSub">JPG・PNG・HEIC・PDF 対応 / 複数同時OK</p>
      </div>
      <div class="scan-result" id="scanResult"></div>
      <div id="batchResult" style="margin-top:10px;display:none;"></div>
    </div>
  </div>
</div>

<!-- LIST TAB -->
<div id="tab-list" class="tab-panel">
  <div class="tbl-controls">
<select id="fOffice" onchange="renderList()"></select>
    <select id="fMonth" onchange="renderList()">
      <option value="">全月</option>
      <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
      <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
      <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
    <input type="text" id="fSearch" placeholder="取引先・内容で検索" oninput="renderList()" style="flex:1;min-width:100px">
    <button class="export-btn" onclick="exportExcel()">⬇ Excel書き出し</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>日付</th><th>事業所</th><th>科目</th><th style="text-align:right">金額</th><th>取引先・内容</th><th></th>
      </tr></thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</div>

<!-- SUMMARY TAB -->
<div id="tab-summary" class="tab-panel">
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <select id="sOffice" onchange="renderSummary()" style="font-size:13px"></select>
  </div>
  <div class="metric-grid" id="metricGrid"></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>事業所 / 科目</th><th>件数</th><th>構成比</th><th style="text-align:right">合計</th>
      </tr></thead>
      <tbody id="summaryBody"></tbody>
    </table>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-ov" id="loadingOv"><div class="loading-box"><div class="spinner"></div><p class="loading-text" id="loadingText">処理中...</p></div></div>

<script>
const CATS_DEFAULT = ['旅費交通費','車両費','厚生費','消耗品費','接待交際費','通信費','租税公課','支払手数料','修繕費','会議費','水道光熱費','地代家賃','雑費'];
const CUSTOM_CATS_KEY = 'custom_categories';

function getCustomCats() {
  return JSON.parse(localStorage.getItem(CUSTOM_CATS_KEY) || '[]');
}

function getAllCats() {
  const custom = getCustomCats();
  return [...CATS_DEFAULT, ...custom.filter(c => !CATS_DEFAULT.includes(c))];
}

function addCustomCat(name) {
  const custom = getCustomCats();
  if (!custom.includes(name) && !CATS_DEFAULT.includes(name)) {
    custom.push(name);
    localStorage.setItem(CUSTOM_CATS_KEY, JSON.stringify(custom));
    rebuildCatSelects();
    showToast(name + ' を科目一覧に追加しました');
  }
}

function rebuildCatSelects() {
  const cats = getAllCats();
  const iSel = document.getElementById('i_cat');
  const iVal = iSel.value;
  iSel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('')
    + '<option value="__custom__">その他（直接入力）</option>';
  if (cats.includes(iVal)) iSel.value = iVal;

  // BADGE更新（カスタム科目はb-otherで）
  cats.forEach(c => { if (!BADGE[c]) BADGE[c] = 'b-other'; });
}

let CATS = getAllCats();
const OFFICES_DEFAULT = ['エスカ','アール','ウィズ','ルミナス','茶屋','アサノ','知立','小牧','八事','岩田','大森','京都','銀座'];
const CUSTOM_OFFICES_KEY = 'custom_offices';

function getCustomOffices() {
  return JSON.parse(localStorage.getItem(CUSTOM_OFFICES_KEY) || '[]');
}

function getAllOffices() {
  const custom = getCustomOffices();
  return [...OFFICES_DEFAULT, ...custom.filter(o => !OFFICES_DEFAULT.includes(o))];
}

function addCustomOffice(name) {
  const custom = getCustomOffices();
  if (!custom.includes(name) && !OFFICES_DEFAULT.includes(name)) {
    custom.push(name);
    localStorage.setItem(CUSTOM_OFFICES_KEY, JSON.stringify(custom));
    rebuildOfficeSelects();
    showToast(name + ' を事業所一覧に追加しました');
  }
}

function rebuildOfficeSelects() {
  const offices = getAllOffices();

  // 入力用select
  const iSel = document.getElementById('i_office');
  const iVal = iSel.value;
  iSel.innerHTML = offices.map(o => `<option value="${o}">${o}</option>`).join('')
    + '<option value="__custom_office__">新規追加...</option>';
  if (offices.includes(iVal)) iSel.value = iVal;

  // フィルター用selects
  ['fOffice', 'sOffice'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const val = sel.value;
    const cb = id === 'fOffice' ? 'renderList()' : 'renderSummary()';
    sel.innerHTML = '<option value="">全事業所</option>'
      + offices.map(o => `<option value="${o}">${o}</option>`).join('');
    if (val) sel.value = val;
  });
}

let OFFICES = getAllOffices();
const BADGE = {'旅費交通費':'b-travel','車両費':'b-car','厚生費':'b-welfare','消耗品費':'b-supply',
  '接待交際費':'b-entertain','通信費':'b-comm','租税公課':'b-tax','支払手数料':'b-fee',
  '修繕費':'b-repair','会議費':'b-meet','水道光熱費':'b-util','地代家賃':'b-rent','雑費':'b-misc'};

let currentYear = 2026;
let data = {};

const SKEY = y => 'jimusho_' + y;
const API_KEY = 'anthropic_api_key';

// ── YEAR ──
function openYearModal() {
  const g = document.getElementById('yearGrid');
  const now = new Date().getFullYear();
  g.innerHTML = '';
  for (let y = now - 3; y <= now + 1; y++) {
    const b = document.createElement('button');
    b.className = 'ybtn' + (y === currentYear ? ' on' : '');
    b.textContent = y + '年';
    b.onclick = () => selectYear(y);
    g.appendChild(b);
  }

// ── IMAGE SCAN ──
async function scanFile(file, apiKey) {
  const isPDF = file.type === 'application/pdf';
  const b64 = await new Promise((ok, ng) => { const r = new FileReader(); r.onload = ev => ok(ev.target.result.split(',')[1]); r.onerror = ng; r.readAsDataURL(file); });
  const headers = { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' };
  if (isPDF) headers['anthropic-beta'] = 'pdfs-2024-09-25';
  const contentBlock = isPDF
    ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } }
    : { type: 'image', source: { type: 'base64', media_type: file.type, data: b64 } };
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model: 'claude-sonnet-4-5', max_tokens: 600,
      system: '領収書を解析してJSONのみ返せ。前置き不要。{"date":"YYYY-MM-DD","category":"旅費交通費|車両費|厚生費|消耗品費|接待交際費|通信費|租税公課|支払手数料|修繕費|会議費|水道光熱費|地代家賃|雑費","amount":0,"vendor":"","detail":""}',
      messages: [{ role: 'user', content: [contentBlock, { type: 'text', text: 'この領収書を解析してください' }] }]
    })
  });
  const d = await resp.json();
  if (d.error) throw new Error(d.error.message);
  const text = d.content.map(b => b.text || '').join('');
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('解析失敗');
  return JSON.parse(m[0]);
}

document.getElementById('imgInput').addEventListener('change', async e => {
  const files = [...e.target.files]; if (!files.length) return;
  const apiKey = getApiKey();
  if (!apiKey) { openApiModal(); showToast('APIキーを設定してください'); return; }

  // 1ファイルの場合は従来通りフォームに反映
  if (files.length === 1) {
    const file = files[0];
    showLoading('AIが解析中...');
    const res = document.getElementById('scanResult');
    res.style.display = 'block'; res.textContent = '解析中...'; res.style.color = 'var(--text2)';
    document.getElementById('batchResult').style.display = 'none';
    try {
      const parsed = await scanFile(file, apiKey);
      if (parsed.date) { document.getElementById('i_date').value = parsed.date; document.getElementById('i_month').value = parseInt(parsed.date.split('-')[1]); }
      if (parsed.category) {
        const s = document.getElementById('i_cat');
        let found = false;
        for (let i = 0; i < s.options.length; i++) { if (s.options[i].value === parsed.category) { s.selectedIndex = i; found = true; break; } }
        if (!found) { s.value = '__custom__'; document.getElementById('i_cat_custom').value = parsed.category; document.getElementById('i_cat_custom').style.display = 'block'; }
      }
      if (parsed.amount) document.getElementById('i_amt').value = parsed.amount;
      if (parsed.vendor) document.getElementById('i_vendor').value = parsed.vendor;
      if (parsed.detail) document.getElementById('i_detail').value = parsed.detail;
      res.textContent = '読み取り完了。内容を確認して「登録する」を押してください。';
      res.style.color = 'var(--accent)';
    } catch (err) {
      res.textContent = '読み取りに失敗しました: ' + err.message;
      res.style.color = 'var(--danger)';
    } finally { hideLoading(); e.target.value = ''; }
    return;
  }

  // 複数ファイルの場合は一括処理して自動登録
  document.getElementById('scanResult').style.display = 'none';
  const batchDiv = document.getElementById('batchResult');
  batchDiv.style.display = 'block';
  batchDiv.innerHTML = `<div style="font-size:13px;color:var(--text2);margin-bottom:8px">0 / ${files.length} 件処理中...</div>`;

  const office = document.getElementById('i_office').value === '__custom_office__'
    ? document.getElementById('i_office_custom').value.trim()
    : document.getElementById('i_office').value;

  let success = 0, fail = 0;
  const results = [];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    batchDiv.innerHTML = `<div style="font-size:13px;color:var(--text2);margin-bottom:8px">${i+1} / ${files.length} 件処理中... (${file.name})</div>`;
    try {
      const parsed = await scanFile(file, apiKey);
      const month = parsed.date ? parseInt(parsed.date.split('-')[1]) : parseInt(document.getElementById('i_month').value);
      const entry = {
        id: Date.now() + i,
        date: parsed.date || new Date().toISOString().split('T')[0],
        month,
        office,
        category: parsed.category || '未分類',
        amount: parsed.amount || 0,
        vendor: parsed.vendor || '',
        detail: parsed.detail || ''
      };
      if (!data[currentYear]) data[currentYear] = [];
      data[currentYear].push(entry);
      results.push({ name: file.name, ok: true, entry });
      success++;
    } catch (err) {
      results.push({ name: file.name, ok: false, err: err.message });
      fail++;
    }
  }

  save();
  batchDiv.innerHTML = `
    <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px">✓ ${success}件登録完了${fail > 0 ? '　✕ ' + fail + '件失敗' : ''}</div>
    ${results.map(r => `<div style="font-size:12px;padding:4px 0;border-bottom:0.5px solid var(--border);color:${r.ok ? 'var(--text)' : 'var(--danger)'}">
      ${r.ok ? '✓' : '✕'} ${r.name}${r.ok ? '　' + (r.entry.vendor || '') + '　¥' + (r.entry.amount||0).toLocaleString() : '　' + r.err}
    </div>`).join('')}
  `;
  showToast(success + '件を登録しました ✓');
  e.target.value = '';
});

// ── SUMMARY ──
function renderSummary() {
  const of = document.getElementById('sOffice').value;
  const all = entries().filter(e => !of || e.office === of);
  const total = all.reduce((s, e) => s + e.amount, 0);
  const months = [...new Set(all.map(e => e.month))].length;
  const topOffice = (() => {
    const b = {}; all.forEach(e => b[e.office] = (b[e.office] || 0) + e.amount);
    const s = Object.entries(b).sort((a, b) => b[1] - a[1]);
    return s[0] ? s[0][0] : '-';
  })();
  document.getElementById('metricGrid').innerHTML = `
    <div class="metric"><div class="metric-label">合計金額</div><div class="metric-val">${fmt(total)}</div><div class="metric-sub">${all.length}件</div></div>
    <div class="metric"><div class="metric-label">月平均</div><div class="metric-val">${months ? fmt(Math.round(total / months)) : '¥0'}</div><div class="metric-sub">${months}ヶ月</div></div>
    <div class="metric"><div class="metric-label">${of ? '最多科目' : '最多事業所'}</div><div class="metric-val" style="font-size:15px">${of ? topCat(all) : topOffice}</div></div>`;

  // 科目別集計（事業所フィルタあり）または事業所別集計
  const byKey = {};
  if (of) {
    CATS.forEach(c => byKey[c] = { count: 0, amount: 0 });
    all.forEach(e => { const k = e.category || '未分類'; if (!byKey[k]) byKey[k] = { count: 0, amount: 0 }; byKey[k].count++; byKey[k].amount += e.amount; });
  } else {
    OFFICES.forEach(o => byKey[o] = { count: 0, amount: 0 });
    all.forEach(e => { const k = e.office || '不明'; if (!byKey[k]) byKey[k] = { count: 0, amount: 0 }; byKey[k].count++; byKey[k].amount += e.amount; });
  }
  const sorted = Object.entries(byKey).filter(([, v]) => v.amount > 0).sort((a, b) => b[1].amount - a[1].amount);
  const tbody = document.getElementById('summaryBody');
  tbody.innerHTML = sorted.map(([key, d]) => `<tr>
    <td>${of ? `<span class="badge ${BADGE[key] || 'b-other'}">${key}</span>` : `<span class="ob">${key}</span>`}</td>
    <td style="color:var(--text2)">${d.count}件</td>
    <td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${total ? Math.round(d.amount / total * 100) : 0}%"></div></div><span style="font-size:11px;color:var(--text2);min-width:30px">${total ? Math.round(d.amount / total * 100) : 0}%</span></div></td>
    <td style="text-align:right;font-weight:600">${fmt(d.amount)}</td>
  </tr>`).join('')
    + `<tr style="border-top:1px solid var(--border)"><td colspan="3" style="color:var(--text2);font-weight:600">合計</td><td style="text-align:right;font-weight:600">${fmt(total)}</td></tr>`;
}

function topCat(all) {
  const b = {}; all.forEach(e => b[e.category] = (b[e.category] || 0) + e.amount);
  const s = Object.entries(b).sort((a, b) => b[1] - a[1]);
  return s[0] ? s[0][0] : '-';
}

// ── EXCEL EXPORT ──
function exportExcel() {
  const all = entries();
  if (!all.length) { showToast('データがありません'); return; }
  showLoading('Excel生成中...');
  try {
    const wb = XLSX.utils.book_new();
    // 事業所×月でシートを作成
    const groups = {};
    all.forEach(e => {
      const k = (e.office || '不明') + (e.month || 1) + '月';
      if (!groups[k]) groups[k] = { office: e.office, month: e.month, entries: [] };
      groups[k].entries.push(e);
    });
    Object.entries(groups).sort((a, b) => {
      if (a[1].month !== b[1].month) return a[1].month - b[1].month;
      return (a[1].office || '').localeCompare(b[1].office || '');
    }).forEach(([, g]) => {
      const rows = [[null, '日付', '借方科目', '金額', '取引先', '内容']];
      g.entries.sort((a, b) => (a.date || '').localeCompare(b.date || '')).forEach((e, i) => {
        rows.push([i + 1, e.date ? new Date(e.date) : null, e.category, e.amount, e.vendor || '', e.detail || '']);
      });
      const total = g.entries.reduce((s, e) => s + e.amount, 0);
      rows.push([null, '合計', null, total]);
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{ wch: 4 }, { wch: 12 }, { wch: 12 }, { wch: 10 }, { wch: 22 }, { wch: 22 }];
      const sheetName = (g.office || '不明') + g.month + '月';
      XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0, 31));
    });
    XLSX.writeFile(wb, `事務所分：立替金清算_${currentYear}年分.xlsx`);
    showToast('Excelを書き出しました ✓');
  } catch (err) { showToast('書き出しに失敗しました'); console.error(err); }
  finally { hideLoading(); }
}
